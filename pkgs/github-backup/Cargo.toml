[package]
name = "github-backup"
version = "0.1.0"
edition = "2021"

[dependencies]
color-eyre = "0.6.3"
gix-config = "0.41.0"
tempdir = "0.3.7"
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", default-features = false, features = [
  "fmt",
] }
url = "2.5.3"
tokio = { version = "1", features = ["macros"] }

progenitor-client = { git = "https://github.com/nathanregner/progenitor" }
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4.38", features = ["serde"] }

[build-dependencies]
prettyplease = "0.2.22"
progenitor = { git = "https://github.com/nathanregner/progenitor" }
serde_json = "1.0"
syn = "2.0"
