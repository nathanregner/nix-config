[package]
name = "amux"
version = "0.1.0"
edition = "2024"
description = "A slop coded tmux status-line/switcher for wrangling agents (claude)"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
etcetera = "0.11"
nix = { version = "0.31.2", features = ["signal", "ucontext", "fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tmux_interface = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[build-dependencies]
clap = { version = "4", features = ["derive"] }
clap_complete = "4"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
tmux_interface = "0.4"
