[workspace]
resolver = "3"
members = ["cli", "clients"]

[workspace.dependencies]
chrono = "0.4.38"
clients = { path = "clients" }
color-eyre = "0.6.3"
figment = "0.10.19"
gix-config = "0.53.0"
http = "1"
prettyplease = "0.2.22"
progenitor = { git = "https://github.com/nathanregner/progenitor" }
progenitor-client = { git = "https://github.com/nathanregner/progenitor" }
reqwest = "0.13"
serde = "1.0"
serde_json = "1.0"
syn = "2.0"
tempdir = "0.3.7"
tokio = "1"
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", default-features = false }
url = "2.5.3"
