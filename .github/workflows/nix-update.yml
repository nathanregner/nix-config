name: Run nix-update

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Comma-separated list of packages to update"
        required: false
        type: string
  schedule:
    - cron: "0 16 * * 6" # min hour day-of-month month day-of-week

jobs:
  nix-update-matrix:
    runs-on: [self-hosted]
    outputs:
      attrs: ${{ steps.attrs.outputs.attrs }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          ref: staging
      - id: attrs
        env:
          PACKAGES: ${{ inputs.packages }}
        run: |
          if [[ -n "$PACKAGES" ]]; then
            attrs=$(nix run nixpkgs#jq -- -Rc 'split(",")' <<<$PACKAGES)
          else
            attrs=$(nix eval .\#update-pkgs.passthru.attrs --json)
          fi
          echo "attrs=$attrs" >> "$GITHUB_OUTPUT"
  nix-update:
    runs-on: [self-hosted]
    needs: nix-update-matrix
    strategy:
      matrix:
        attr: ${{ fromJSON(needs.nix-update-matrix.outputs.attrs) }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          ref: staging
      - name: Run update script
        run: |
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git config user.name "github-actions[bot]"
          nix run .\#update-pkgs -- ${{ matrix.attr }}
          git add -A
          git commit -m "build: update ${{ matrix.attr }}" || echo "no changes"
          git push
